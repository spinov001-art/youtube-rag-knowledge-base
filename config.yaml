extraction:
  max_videos: 100
  languages: ["en"]
  delay_between_requests: 1.0  # seconds

chunking:
  chunk_size: 500  # tokens
  overlap: 50      # tokens

embeddings:
  provider: "sentence-transformers"
  model: "all-MiniLM-L6-v2"

vector_store:
  provider: "chroma"
  path: "./knowledge_base"

llm:
  provider: "ollama"
  model: "llama3"
